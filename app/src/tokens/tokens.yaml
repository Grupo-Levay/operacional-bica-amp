# tokens.yaml — Fonte de verdade do design system Bica & AMP 213
# Exportado para CSS custom properties e TypeScript via tokens/index.ts

color:
  # Brand — Bica Bar
  bica:         "#c4973a"
  bica-dark:    "#a07a28"
  bica-light:   "#f5e8c8"
  bica-fg:      "#ffffff"

  # Brand — AMP 213
  amp:          "#c13b2a"
  amp-dark:     "#9a2e1f"
  amp-light:    "#f7dbd7"
  amp-fg:       "#ffffff"

  # Semânticos
  success:      "#16a34a"
  success-light: "#dcfce7"
  warning:      "#f59e0b"
  warning-light: "#fef9c3"
  danger:       "#dc2626"
  danger-light: "#fee2e2"
  info:         "#2563eb"
  info-light:   "#dbeafe"

  # Neutros
  neutral-50:   "#fafafa"
  neutral-100:  "#f4f4f5"
  neutral-200:  "#e4e4e7"
  neutral-300:  "#d4d4d8"
  neutral-400:  "#a1a1aa"
  neutral-500:  "#71717a"
  neutral-600:  "#52525b"
  neutral-700:  "#3f3f46"
  neutral-800:  "#27272a"
  neutral-900:  "#18181b"

spacing:
  1:   "0.25rem"   # 4px
  2:   "0.5rem"    # 8px
  3:   "0.75rem"   # 12px
  4:   "1rem"      # 16px
  5:   "1.25rem"   # 20px
  6:   "1.5rem"    # 24px
  8:   "2rem"      # 32px
  10:  "2.5rem"    # 40px
  12:  "3rem"      # 48px
  16:  "4rem"      # 64px

typography:
  font-sans:    "'Inter', system-ui, sans-serif"
  font-mono:    "'Geist Mono', monospace"
  text-xs:      "0.75rem"
  text-sm:      "0.875rem"
  text-base:    "1rem"
  text-lg:      "1.125rem"
  text-xl:      "1.25rem"
  text-2xl:     "1.5rem"
  text-3xl:     "1.875rem"
  font-normal:  "400"
  font-medium:  "500"
  font-semibold: "600"
  font-bold:    "700"

radius:
  sm:   "0.25rem"   # 4px
  md:   "0.5rem"    # 8px
  lg:   "0.75rem"   # 12px
  xl:   "1rem"      # 16px
  full: "9999px"

shadow:
  sm:  "0 1px 2px rgb(0 0 0 / 0.05)"
  md:  "0 4px 6px -1px rgb(0 0 0 / 0.1)"
  lg:  "0 10px 15px -3px rgb(0 0 0 / 0.1)"
  xl:  "0 20px 25px -5px rgb(0 0 0 / 0.1)"

transition:
  fast:   "150ms ease"
  normal: "200ms ease"
  slow:   "300ms ease"

z-index:
  base:    "0"
  above:   "10"
  nav:     "100"
  modal:   "200"
  toast:   "300"
  tooltip: "400"
